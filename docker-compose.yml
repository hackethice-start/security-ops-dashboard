version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Security Operations Dashboard – Full Stack
#
#  ┌──────────────────────────────────────────────────────────────────────────┐
#  │  dashboard  (React + Nginx)  :3000  ←  static UI                        │
#  │  backend    (Node + Express) :4000  ←  collector + REST API              │
#  │  db         (PostgreSQL 16)  :5432  ←  1-year rolling data store         │
#  └──────────────────────────────────────────────────────────────────────────┘
#
# Usage:
#   1. cp .env.example .env  →  fill in credentials
#   2. docker compose up -d --build
#   3. Dashboard → http://localhost:3000
#      Backend API → http://localhost:4000/api/health
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 (1-year rolling data) ─────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: secops-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-secops}
      POSTGRES_USER:     ${POSTGRES_USER:-secops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secops_pass}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-secops} -d ${POSTGRES_DB:-secops}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ── Backend Collector + API ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: secops-backend:latest
    container_name: secops-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT:              4000
      NODE_ENV:          production
      # PostgreSQL
      POSTGRES_HOST:     db
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB:-secops}
      POSTGRES_USER:     ${POSTGRES_USER:-secops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secops_pass}
      # Tool credentials (server-side – never exposed to the browser)
      FORTINET_HOST:     ${REACT_APP_FORTINET_HOST}
      FORTINET_APIKEY:   ${REACT_APP_FORTINET_APIKEY}
      PALOALTO_HOST:     ${REACT_APP_PALOALTO_HOST}
      PALOALTO_APIKEY:   ${REACT_APP_PALOALTO_APIKEY}
      UPGUARD_APIKEY:    ${REACT_APP_UPGUARD_APIKEY}
      AZURE_TENANT_ID:       ${REACT_APP_AZURE_TENANT_ID}
      AZURE_CLIENT_ID:       ${REACT_APP_AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET:   ${REACT_APP_AZURE_CLIENT_SECRET}
      AZURE_SUBSCRIPTION_ID: ${REACT_APP_AZURE_SUBSCRIPTION_ID}
      QUALYS_USERNAME:   ${REACT_APP_QUALYS_USERNAME}
      QUALYS_PASSWORD:   ${REACT_APP_QUALYS_PASSWORD}
      ME_HOST:           ${REACT_APP_ME_HOST}
      ME_APIKEY:         ${REACT_APP_ME_APIKEY}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── React Dashboard (Nginx) ──────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Point the React app at the backend API
        REACT_APP_API_BASE_URL:          ${REACT_APP_API_BASE_URL:-http://localhost:4000}
        # Tool credentials still passed for direct browser calls (fallback)
        REACT_APP_FORTINET_HOST:         ${REACT_APP_FORTINET_HOST}
        REACT_APP_FORTINET_APIKEY:       ${REACT_APP_FORTINET_APIKEY}
        REACT_APP_PALOALTO_HOST:         ${REACT_APP_PALOALTO_HOST}
        REACT_APP_PALOALTO_APIKEY:       ${REACT_APP_PALOALTO_APIKEY}
        REACT_APP_UPGUARD_APIKEY:        ${REACT_APP_UPGUARD_APIKEY}
        REACT_APP_AZURE_TENANT_ID:       ${REACT_APP_AZURE_TENANT_ID}
        REACT_APP_AZURE_CLIENT_ID:       ${REACT_APP_AZURE_CLIENT_ID}
        REACT_APP_AZURE_CLIENT_SECRET:   ${REACT_APP_AZURE_CLIENT_SECRET}
        REACT_APP_AZURE_SUBSCRIPTION_ID: ${REACT_APP_AZURE_SUBSCRIPTION_ID}
        REACT_APP_QUALYS_USERNAME:       ${REACT_APP_QUALYS_USERNAME}
        REACT_APP_QUALYS_PASSWORD:       ${REACT_APP_QUALYS_PASSWORD}
        REACT_APP_ME_HOST:               ${REACT_APP_ME_HOST}
        REACT_APP_ME_APIKEY:             ${REACT_APP_ME_APIKEY}
    image: secops-dashboard:latest
    container_name: secops-dashboard
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pg_data:
    driver: local
    labels:
      com.company.description: "Security Ops Dashboard – 1-year PostgreSQL data"

networks:
  default:
    name: secops-net
