version: "3.9"

# ── SecOps Command Center ─────────────────────────────────────────────────────
# Services:
#   dashboard  :3000  React SPA (nginx)
#   backend    :4000  SecOps data collection + integrations
#   db         :5432  PostgreSQL 16

services:
  # ── React SPA ──────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    dns: [8.8.8.8, 8.8.4.4, 1.1.1.1]
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - default
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── SecOps Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    dns: [8.8.8.8, 8.8.4.4, 1.1.1.1]
    environment:
      - DATABASE_URL=postgresql://\${POSTGRES_USER:-secops}:\${POSTGRES_PASSWORD:-changeme}@db:5432/\${POSTGRES_DB:-secops}
      - POSTGRES_HOST=db
      - POSTGRES_DB=${POSTGRES_DB:-secops}
      - POSTGRES_USER=${POSTGRES_USER:-secops}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:-secops-jwt-change-this-in-production}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    dns: [8.8.8.8, 8.8.4.4]
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-secops}
      - POSTGRES_USER=${POSTGRES_USER:-secops}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    restart: unless-stopped
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-secops}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  pg_data:

networks:
  default:
    driver: bridge
    name: secops-network
