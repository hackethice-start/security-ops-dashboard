server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"   always;
    add_header X-Content-Type-Options   "nosniff"      always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://cyber-risk.upguard.com https://management.azure.com https://login.microsoftonline.com https://qualysapi.qualys.com;" always;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Static asset caching (hashed filenames from React build) ───────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── React SPA fallback – all routes serve index.html ───────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Health check endpoint ───────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── Optional: Qualys proxy (uncomment if qualys-proxy service not used) ─
    # location /qualys/ {
    #     proxy_pass https://qualysapi.qualys.com/;
    #     proxy_set_header Host qualysapi.qualys.com;
    #     proxy_ssl_server_name on;
    # }

    # ── Error pages ─────────────────────────────────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
