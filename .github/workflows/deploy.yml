name: Deploy Security Ops Dashboard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_DASHBOARD: ghcr.io/${{ github.repository_owner }}/secops-dashboard
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/secops-backend

jobs:
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      short_sha: ${{ steps.slug.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: slug
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata - dashboard
        id: meta-dashboard
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_DASHBOARD }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-dashboard.outputs.tags }}
          labels: ${{ steps.meta-dashboard.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REACT_APP_FORTINET_HOST=${{ secrets.FORTINET_HOST }}
            REACT_APP_FORTINET_APIKEY=${{ secrets.FORTINET_APIKEY }}
            REACT_APP_PALOALTO_HOST=${{ secrets.PALOALTO_HOST }}
            REACT_APP_PALOALTO_APIKEY=${{ secrets.PALOALTO_APIKEY }}
            REACT_APP_UPGUARD_APIKEY=${{ secrets.UPGUARD_APIKEY }}
            REACT_APP_AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}
            REACT_APP_AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}
            REACT_APP_AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}
            REACT_APP_AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}
            REACT_APP_QUALYS_USERNAME=${{ secrets.QUALYS_USERNAME }}
            REACT_APP_QUALYS_PASSWORD=${{ secrets.QUALYS_PASSWORD }}
            REACT_APP_ME_HOST=${{ secrets.ME_HOST }}
            REACT_APP_ME_APIKEY=${{ secrets.ME_APIKEY }}
            REACT_APP_API_BASE_URL=http://${{ secrets.SERVER_HOST }}:4000

      - name: Docker metadata - backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Ubuntu Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write production env file
        run: |
          cat > .env.prod << EOF
          REGISTRY=${{ env.REGISTRY }}
          GITHUB_OWNER=${{ github.repository_owner }}
          IMAGE_TAG=sha-${{ needs.build.outputs.short_sha }}
          DASHBOARD_PORT=3000
          POSTGRES_DB=secops
          POSTGRES_USER=secops
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          FORTINET_HOST=${{ secrets.FORTINET_HOST }}
          FORTINET_APIKEY=${{ secrets.FORTINET_APIKEY }}
          PALOALTO_HOST=${{ secrets.PALOALTO_HOST }}
          PALOALTO_APIKEY=${{ secrets.PALOALTO_APIKEY }}
          UPGUARD_APIKEY=${{ secrets.UPGUARD_APIKEY }}
          AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}
          QUALYS_USERNAME=${{ secrets.QUALYS_USERNAME }}
          QUALYS_PASSWORD=${{ secrets.QUALYS_PASSWORD }}
          ME_HOST=${{ secrets.ME_HOST }}
          ME_APIKEY=${{ secrets.ME_APIKEY }}
          EOF

      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docker-compose.prod.yml,db/schema.sql,.env.prod"
          target: ${{ secrets.SERVER_DEPLOY_PATH }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cd ${{ secrets.SERVER_DEPLOY_PATH }}
            mv .env.prod .env
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            echo "Deploy complete at $(date)"

      - name: Health check - dashboard
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.SERVER_HOST }}:3000/ --max-time 10)
          echo "Dashboard HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Health check - backend API
        run: |
          RESP=$(curl -s http://${{ secrets.SERVER_HOST }}:4000/api/health --max-time 10)
          echo "Backend response: $RESP"
          echo "$RESP" | grep -q '"status":"ok"' || exit 1

      - name: Notify on failure
        if: failure()
        run: echo "::error::Deployment to ${{ secrets.SERVER_HOST }} FAILED on commit ${{ github.sha }}"
