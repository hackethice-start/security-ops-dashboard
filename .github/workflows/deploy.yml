name: Deploy Security Ops Dashboard

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write env file
        env:
          PG_PASS: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          echo "POSTGRES_DB=secops" > .env
          echo "POSTGRES_USER=secops" >> .env
          echo "POSTGRES_PASSWORD=${PG_PASS}" >> .env
          echo "POSTGRES_HOST=db" >> .env
          echo "POSTGRES_PORT=5432" >> .env
          echo "NODE_ENV=production" >> .env
          echo "PORT=4000" >> .env

      - name: Check docker compose
        run: docker compose version || apt-get install -y docker-compose-plugin

      - name: Free ports, remove stale containers, prune disk
        run: |
          docker compose down --remove-orphans || true
          echo "--- Removing stale named containers ---"
          for NAME in secops-db secops-backend secops-dashboard; do
            docker rm -f "$NAME" 2>/dev/null && echo "Removed $NAME" || true
          done
          echo "--- Stopping containers on ports 3000/4000 ---"
          for CID in $(docker ps --format "{{.ID}} {{.Ports}}" | grep -E ":3000|:4000" | awk '{print $1}'); do
            docker stop "$CID" || true
            docker rm -f "$CID" || true
          done
          echo "--- Pruning unused Docker images and build cache ---"
          docker image prune -af --filter "until=24h" || true
          docker builder prune -af --filter "until=24h" || true
          echo "--- Disk usage after prune ---"
          df -h /
          echo "Done"

      - name: Build images
        run: docker compose build --no-cache

      - name: Start stack
        run: docker compose up --detach

      - name: Wait for startup
        run: sleep 35

      - name: Health check dashboard
        run: curl -f --retry 3 --retry-delay 5 http://localhost:3000/

      - name: Health check backend
        run: curl -f --retry 3 --retry-delay 5 http://localhost:4000/api/health

      - name: Show status
        if: always()
        run: docker compose ps && docker compose logs --tail 30
