# ─────────────────────────────────────────────────────────────────────────────
# Security Operations Dashboard – CI/CD Pipeline
#
#  Trigger : push to main  →  build → push to ghcr.io → deploy to Ubuntu server
#  PR check: push to any PR →  build + test only (no deploy)
#
#  Required GitHub Secrets (Settings → Secrets → Actions):
#  ┌─────────────────────────────┬──────────────────────────────────────────┐
#  │ Secret name                 │ Value                                    │
#  ├─────────────────────────────┼──────────────────────────────────────────┤
#  │ SERVER_HOST                 │ IP or hostname of your Ubuntu server     │
#  │ SERVER_USER                 │ SSH user (e.g. deploy)                   │
#  │ SERVER_SSH_KEY              │ Private SSH key (paste full key)         │
#  │ SERVER_PORT                 │ SSH port (default 22)                    │
#  │ SERVER_DEPLOY_PATH          │ /opt/secops  (folder on server)          │
#  ├─────────────────────────────┼──────────────────────────────────────────┤
#  │ FORTINET_HOST               │ https://192.168.1.1                      │
#  │ FORTINET_APIKEY             │ FortiGate REST API token                 │
#  │ PALOALTO_HOST               │ https://panorama.company.com             │
#  │ PALOALTO_APIKEY             │ PAN-OS API key                           │
#  │ UPGUARD_APIKEY              │ UpGuard API key                          │
#  │ AZURE_TENANT_ID             │ Azure AD tenant ID                       │
#  │ AZURE_CLIENT_ID             │ App registration client ID               │
#  │ AZURE_CLIENT_SECRET         │ App registration secret                  │
#  │ AZURE_SUBSCRIPTION_ID       │ Azure subscription ID                    │
#  │ QUALYS_USERNAME             │ Qualys reader account username           │
#  │ QUALYS_PASSWORD             │ Qualys reader account password           │
#  │ ME_HOST                     │ https://meserver:8443                    │
#  │ ME_APIKEY                   │ ManageEngine Zoho OAuth token            │
#  │ POSTGRES_PASSWORD           │ Strong DB password (auto-generated OK)   │
#  └─────────────────────────────┴──────────────────────────────────────────┘
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy – Security Ops Dashboard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY:         ghcr.io
  IMAGE_DASHBOARD:  ghcr.io/${{ github.repository_owner }}/secops-dashboard
  IMAGE_BACKEND:    ghcr.io/${{ github.repository_owner }}/secops-backend

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 – Build & push images to ghcr.io
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # needed to push to ghcr.io

    outputs:
      dashboard_tag: ${{ steps.meta-dashboard.outputs.tags }}
      backend_tag:   ${{ steps.meta-backend.outputs.tags }}
      short_sha:     ${{ steps.slug.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: slug
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Dashboard image ───────────────────────────────────────────────────
      - name: Docker metadata – dashboard
        id: meta-dashboard
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_DASHBOARD }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push – dashboard
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-dashboard.outputs.tags }}
          labels: ${{ steps.meta-dashboard.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            REACT_APP_FORTINET_HOST=${{ secrets.FORTINET_HOST }}
            REACT_APP_FORTINET_APIKEY=${{ secrets.FORTINET_APIKEY }}
            REACT_APP_PALOALTO_HOST=${{ secrets.PALOALTO_HOST }}
            REACT_APP_PALOALTO_APIKEY=${{ secrets.PALOALTO_APIKEY }}
            REACT_APP_UPGUARD_APIKEY=${{ secrets.UPGUARD_APIKEY }}
            REACT_APP_AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}
            REACT_APP_AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}
            REACT_APP_AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}
            REACT_APP_AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}
            REACT_APP_QUALYS_USERNAME=${{ secrets.QUALYS_USERNAME }}
            REACT_APP_QUALYS_PASSWORD=${{ secrets.QUALYS_PASSWORD }}
            REACT_APP_ME_HOST=${{ secrets.ME_HOST }}
            REACT_APP_ME_APIKEY=${{ secrets.ME_APIKEY }}
            REACT_APP_API_BASE_URL=http://${{ secrets.SERVER_HOST }}:4000

      # ── Backend image ─────────────────────────────────────────────────────
      - name: Docker metadata – backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push – backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 – Deploy to Ubuntu server (main branch only)
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Ubuntu Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: http://${{ secrets.SERVER_HOST }}:3000

    steps:
      - name: Checkout code (for compose files)
        uses: actions/checkout@v4

      - name: Write .env for server
        run: |
          cat > .env.prod << EOF
          REGISTRY=${{ env.REGISTRY }}
          GITHUB_OWNER=${{ github.repository_owner }}
          IMAGE_TAG=sha-${{ needs.build.outputs.short_sha }}
          DASHBOARD_PORT=3000
          POSTGRES_DB=secops
          POSTGRES_USER=secops
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          FORTINET_HOST=${{ secrets.FORTINET_HOST }}
          FORTINET_APIKEY=${{ secrets.FORTINET_APIKEY }}
          PALOALTO_HOST=${{ secrets.PALOALTO_HOST }}
          PALOALTO_APIKEY=${{ secrets.PALOALTO_APIKEY }}
          UPGUARD_APIKEY=${{ secrets.UPGUARD_APIKEY }}
          AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}
          QUALYS_USERNAME=${{ secrets.QUALYS_USERNAME }}
          QUALYS_PASSWORD=${{ secrets.QUALYS_PASSWORD }}
          ME_HOST=${{ secrets.ME_HOST }}
          ME_APIKEY=${{ secrets.ME_APIKEY }}
          EOF

      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          port:     ${{ secrets.SERVER_PORT || 22 }}
          source:   "docker-compose.prod.yml,db/schema.sql,.env.prod"
          target:   ${{ secrets.SERVER_DEPLOY_PATH }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          port:     ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.SERVER_DEPLOY_PATH }}

            # Rename env file
            mv .env.prod .env

            # Log in to ghcr.io on server
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker compose -f docker-compose.prod.yml pull

            # Bring up stack (zero-downtime: recreate only changed containers)
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up dangling images
            docker image prune -f

            echo "✅ Deploy complete – $(date)"

      - name: Health check – dashboard
        run: |
          echo "Waiting 30s for containers to stabilise..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ secrets.SERVER_HOST }}:3000/ --max-time 10)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Dashboard health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Dashboard responding (HTTP $STATUS)"

      - name: Health check – backend API
        run: |
          RESP=$(curl -s http://${{ secrets.SERVER_HOST }}:4000/api/health --max-time 10)
          echo "Backend response: $RESP"
          echo "$RESP" | grep -q '"status":"ok"' || {
            echo "❌ Backend health check failed"
            exit 1
          }
          echo "✅ Backend API healthy"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::🚨 Deployment to ${{ secrets.SERVER_HOST }} FAILED on commit ${{ github.sha }}"
          echo "::error::Review logs above and check docker logs on the server"
