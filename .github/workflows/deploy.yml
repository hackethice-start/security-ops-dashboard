name: Deploy Security Ops Dashboard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_DASHBOARD: ghcr.io/${{ github.repository_owner }}/secops-dashboard
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/secops-backend

jobs:
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      short_sha: ${{ steps.slug.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: slug
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test build outside Docker
        run: |
          npm install
          npm run build
        env:
          CI: "false"

      - name: Docker metadata - dashboard
        id: meta-dashboard
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_DASHBOARD }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-dashboard.outputs.tags }}
          labels: ${{ steps.meta-dashboard.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REACT_APP_FORTINET_HOST=${{ secrets.FORTINET_HOST }}
            REACT_APP_FORTINET_APIKEY=${{ secrets.FORTINET_APIKEY }}
            REACT_APP_PALOALTO_HOST=${{ secrets.PALOALTO_HOST }}
            REACT_APP_PALOALTO_APIKEY=${{ secrets.PALOALTO_APIKEY }}
            REACT_APP_UPGUARD_APIKEY=${{ secrets.UPGUARD_APIKEY }}
            REACT_APP_AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}
            REACT_APP_AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}
            REACT_APP_AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}
            REACT_APP_AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}
            REACT_APP_QUALYS_USERNAME=${{ secrets.QUALYS_USERNAME }}
            REACT_APP_QUALYS_PASSWORD=${{ secrets.QUALYS_PASSWORD }}
            REACT_APP_ME_HOST=${{ secrets.ME_HOST }}
            REACT_APP_ME_APIKEY=${{ secrets.ME_APIKEY }}
            REACT_APP_API_BASE_URL=http://192.168.101.10:4000

      - name: Docker metadata - backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on Server
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write .env file
        run: |
          cat > /opt/secops/.env << EOF
          REGISTRY=${{ env.REGISTRY }}
          GITHUB_OWNER=${{ github.repository_owner }}
          IMAGE_TAG=sha-${{ needs.build.outputs.short_sha }}
          DASHBOARD_PORT=3000
          POSTGRES_DB=secops
          POSTGRES_USER=secops
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          FORTINET_HOST=${{ secrets.FORTINET_HOST }}
          FORTINET_APIKEY=${{ secrets.FORTINET_APIKEY }}
          PALOALTO_HOST=${{ secrets.PALOALTO_HOST }}
          PALOALTO_APIKEY=${{ secrets.PALOALTO_APIKEY }}
          UPGUARD_APIKEY=${{ secrets.UPGUARD_APIKEY }}
          AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}
          QUALYS_USERNAME=${{ secrets.QUALYS_USERNAME }}
          QUALYS_PASSWORD=${{ secrets.QUALYS_PASSWORD }}
          ME_HOST=${{ secrets.ME_HOST }}
          ME_APIKEY=${{ secrets.ME_APIKEY }}
          EOF

      - name: Copy compose and schema files
        run: |
          cp docker-compose.prod.yml /opt/secops/docker-compose.prod.yml
          mkdir -p /opt/secops/db
          cp db/schema.sql /opt/secops/db/schema.sql

      - name: Login to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest images
        run: docker compose -f /opt/secops/docker-compose.prod.yml pull

      - name: Start stack
        run: docker compose -f /opt/secops/docker-compose.prod.yml up -d --remove-orphans

      - name: Clean up old images
        run: docker image prune -f

      - name: Health check
        run: |
          sleep 20
          curl -sf http://localhost:3000/ && echo "Dashboard OK" || echo "Dashboard not ready yet"
          curl -sf http://localhost:4000/api/health && echo "Backend OK" || echo "Backend not ready yet"
