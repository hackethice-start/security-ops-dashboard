name: Deploy - Security Ops Dashboard

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build and Deploy on Server
    runs-on: self-hosted

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Write .env file
        run: |
          printf 'POSTGRES_DB=secops\n' > $GITHUB_WORKSPACE/.env
          printf 'POSTGRES_USER=secops\n' >> $GITHUB_WORKSPACE/.env
          printf 'POSTGRES_PASSWORD=%s\n' '${{ secrets.POSTGRES_PASSWORD }}' >> $GITHUB_WORKSPACE/.env
          printf 'POSTGRES_HOST=db\n' >> $GITHUB_WORKSPACE/.env
          printf 'POSTGRES_PORT=5432\n' >> $GITHUB_WORKSPACE/.env
          printf 'NODE_ENV=production\n' >> $GITHUB_WORKSPACE/.env
          printf 'PORT=4000\n' >> $GITHUB_WORKSPACE/.env
          echo ".env written"

      - name: Ensure Docker Compose is available
        run: |
          docker compose version 2>/dev/null && exit 0
          echo "Installing docker-compose-plugin..."
          apt-get update -qq && apt-get install -y docker-compose-plugin 2>/dev/null || true
          docker compose version

      - name: Stop existing containers
        working-directory: ${{ github.workspace }}
        run: docker compose down --remove-orphans || true

      - name: Build fresh images (no cache)
        working-directory: ${{ github.workspace }}
        run: docker compose build --no-cache

      - name: Start stack
        working-directory: ${{ github.workspace }}
        run: docker compose up --detach

      - name: Wait for services to start
        run: sleep 30

      - name: Health check - Dashboard
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ --max-time 15)
          echo "Dashboard HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "FAILED - dashboard logs:"
            docker compose -f $GITHUB_WORKSPACE/docker-compose.yml logs dashboard
            exit 1
          fi
          echo "Dashboard OK"

      - name: Health check - Backend API
        run: |
          RESP=$(curl -s http://localhost:4000/api/health --max-time 10)
          echo "Backend response: $RESP"
          echo "$RESP" | grep -q '"status":"ok"' || {
            echo "FAILED - backend logs:"
            docker compose -f $GITHUB_WORKSPACE/docker-compose.yml logs backend
            exit 1
          }
          echo "Backend OK"

      - name: Show running containers
        if: always()
     